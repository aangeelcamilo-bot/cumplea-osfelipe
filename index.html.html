<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Juan Felipe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --pixel: 4px;
    --black: #0a0a0f;
    --dark: #0d0d1a;
    --purple: #2d0057;
    --blue: #0000aa;
    --cyan: #00ffff;
    --yellow: #ffff00;
    --orange: #ff8800;
    --pink: #ff00aa;
    --green: #00ff44;
    --white: #e8e8ff;
    --scanline: rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--black);
    font-family: 'Press Start 2P', monospace;
    overflow-x: hidden;
  }

  /* CRT scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px,
      transparent 1px,
      transparent 3px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 9999;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
  }

  /* Stars background */
  #stars-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--white);
    animation: twinkle var(--d, 3s) infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%,100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  /* INTRO SCREEN */
  #intro-screen {
    position: fixed;
    inset: 0;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 40px;
  }

  .intro-title {
    font-size: clamp(10px, 2vw, 18px);
    color: var(--yellow);
    text-align: center;
    line-height: 2.5;
    text-shadow: 0 0 10px var(--orange), 0 0 20px var(--orange);
    animation: glowPulse 2s ease-in-out infinite;
    padding: 0 20px;
  }

  @keyframes glowPulse {
    0%,100% { text-shadow: 0 0 10px var(--orange), 0 0 20px var(--orange); }
    50% { text-shadow: 0 0 20px var(--yellow), 0 0 40px var(--yellow), 0 0 60px var(--orange); }
  }

  .pixel-heart-big {
    display: inline-block;
    font-size: 32px;
    animation: heartbeat 1s ease-in-out infinite;
    filter: drop-shadow(0 0 8px var(--pink));
  }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  #start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1.8vw, 14px);
    color: var(--black);
    background: var(--cyan);
    border: none;
    padding: 16px 32px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 6px 6px 0 #008888, -2px -2px 0 #00aaaa;
    transition: all 0.1s;
    animation: btnBlink 1.5s steps(1) infinite;
    position: relative;
  }

  @keyframes btnBlink {
    0%,49% { opacity: 1; }
    50%,100% { opacity: 0.3; }
  }

  #start-btn:hover {
    animation: none;
    background: var(--yellow);
    transform: translate(3px, 3px);
    box-shadow: 3px 3px 0 #888800;
  }

  #start-btn:active {
    transform: translate(6px, 6px);
    box-shadow: none;
  }

  /* Pixel decorations on intro */
  .intro-deco {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .pixel-sprite {
    font-size: 28px;
    animation: floatSprite 2s ease-in-out infinite;
  }

  .pixel-sprite:nth-child(2) { animation-delay: 0.5s; font-size: 22px; }
  .pixel-sprite:nth-child(3) { animation-delay: 1s; }

  @keyframes floatSprite {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* MAIN CONTENT */
  #main-content {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 20px;
  }

  #main-content.visible { display: block; }

  /* Header */
  .game-header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 700px;
    margin: 0 auto 30px;
    font-size: clamp(7px, 1.2vw, 10px);
    color: var(--green);
    padding: 8px 16px;
    border: 2px solid var(--green);
    background: rgba(0,255,68,0.05);
  }

  .lives { color: var(--pink); }

  .title-main {
    font-size: clamp(14px, 3.5vw, 32px);
    color: var(--yellow);
    line-height: 1.5;
    text-shadow:
      4px 4px 0 var(--orange),
      8px 8px 0 rgba(255,136,0,0.3);
    animation: titleShimmer 3s ease-in-out infinite;
    margin-bottom: 10px;
  }

  @keyframes titleShimmer {
    0%,100% { color: var(--yellow); }
    33% { color: var(--cyan); }
    66% { color: var(--pink); }
  }

  .title-sub {
    font-size: clamp(8px, 1.5vw, 12px);
    color: var(--cyan);
    letter-spacing: 4px;
    opacity: 0.8;
  }

  /* Pixel divider */
  .pixel-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 24px auto;
    max-width: 600px;
  }

  .pixel-divider-line {
    height: 4px;
    flex: 1;
    background: repeating-linear-gradient(90deg, var(--purple) 0, var(--purple) 8px, transparent 8px, transparent 12px);
  }

  .pixel-divider-icon { font-size: 20px; }

  /* Landscape / scene */
  .pixel-scene {
    max-width: 700px;
    margin: 0 auto 30px;
    height: 80px;
    position: relative;
    overflow: hidden;
    border: 4px solid var(--blue);
    background: linear-gradient(180deg, #00001a 0%, #000033 50%, #001133 100%);
  }

  .scene-moon {
    position: absolute;
    top: 10px; right: 40px;
    width: 24px; height: 24px;
    background: var(--yellow);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--yellow), 0 0 40px rgba(255,255,0,0.3);
  }

  .scene-bird {
    position: absolute;
    top: 20px;
    font-size: 14px;
    animation: flyBird 8s linear infinite;
  }

  .scene-bird:nth-child(2) { top: 30px; animation-duration: 12s; animation-delay: -4s; font-size: 10px; }
  .scene-bird:nth-child(3) { top: 15px; animation-duration: 10s; animation-delay: -2s; font-size: 12px; }

  @keyframes flyBird {
    from { left: -30px; }
    to { left: 110%; }
  }

  .scene-ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 20px;
    background: repeating-linear-gradient(90deg, #1a3300 0, #1a3300 8px, #002200 8px, #002200 16px);
  }

  .scene-city {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    height: 35px;
    background:
      /* buildings pixel art */
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 30px, transparent 30px) 10px 0 / 18px 100% no-repeat,
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 20px, transparent 20px) 35px 0 / 14px 100% no-repeat,
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 35px, transparent 35px) 55px 0 / 22px 100% no-repeat,
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 18px, transparent 18px) 85px 0 / 12px 100% no-repeat,
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 28px, transparent 28px) 110px 0 / 20px 100% no-repeat,
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 22px, transparent 22px) 140px 0 / 16px 100% no-repeat,
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 32px, transparent 32px) 165px 0 / 24px 100% no-repeat,
      linear-gradient(to top, #0a0a2a 0, #0a0a2a 16px, transparent 16px) 200px 0 / 10px 100% no-repeat;
  }

  /* Text box - RPG style */
  .text-box-wrapper {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 10px;
  }

  .text-box {
    background: rgba(0, 0, 20, 0.92);
    border: 4px solid var(--cyan);
    box-shadow:
      inset 0 0 20px rgba(0,255,255,0.05),
      0 0 0 2px var(--blue),
      0 0 30px rgba(0,255,255,0.1);
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
  }

  .text-box::before {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 1px solid rgba(0,255,255,0.2);
    pointer-events: none;
  }

  /* Corner ornaments */
  .text-box::after {
    content: '◆';
    position: absolute;
    top: -2px; right: 8px;
    color: var(--cyan);
    font-size: 10px;
  }

  .text-box-header {
    font-size: clamp(7px, 1.2vw, 10px);
    color: var(--green);
    margin-bottom: 16px;
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .text-box-header::after {
    content: '';
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--green), transparent);
  }

  .text-paragraph {
    font-family: 'VT323', monospace;
    font-size: clamp(18px, 2.5vw, 22px);
    color: var(--white);
    line-height: 1.7;
    margin-bottom: 0;
    letter-spacing: 0.5px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .text-paragraph.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  .text-paragraph + .text-paragraph {
    margin-top: 20px;
  }

  /* Special words highlight */
  .highlight-yellow { color: var(--yellow); font-weight: bold; }
  .highlight-cyan { color: var(--cyan); }
  .highlight-pink { color: var(--pink); }
  .highlight-green { color: var(--green); }

  /* Navigation arrows */
  .nav-bar {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 20px 0;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }

  .nav-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 1.2vw, 9px);
    color: var(--black);
    background: var(--green);
    border: none;
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #006622;
    transition: all 0.1s;
    letter-spacing: 1px;
  }

  .nav-btn:hover {
    background: var(--yellow);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #886600;
  }

  .nav-btn:active {
    transform: translate(4px, 4px);
    box-shadow: none;
  }

  .nav-btn:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
    box-shadow: 4px 4px 0 #111;
  }

  /* Page indicator */
  .page-indicator {
    text-align: center;
    font-size: clamp(7px, 1.2vw, 9px);
    color: var(--orange);
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .page-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--purple);
    margin: 0 3px;
    transition: background 0.3s;
  }

  .page-dot.active { background: var(--orange); }

  /* Floating pixel elements */
  .pixel-float {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    z-index: 2;
    animation: pixelFloat var(--dur, 6s) ease-in-out infinite var(--dly, 0s);
    opacity: 0.4;
  }

  @keyframes pixelFloat {
    0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
    50% { transform: translateY(-20px) rotate(10deg); opacity: 0.7; }
  }

  /* Final screen special */
  .final-box {
    border-color: var(--pink);
    box-shadow:
      inset 0 0 20px rgba(255,0,170,0.05),
      0 0 0 2px var(--purple),
      0 0 40px rgba(255,0,170,0.15);
  }

  .final-title {
    text-align: center;
    font-size: clamp(8px, 1.5vw, 12px);
    color: var(--pink);
    margin-bottom: 24px;
    letter-spacing: 3px;
    animation: glowPulse 2s ease-in-out infinite;
    text-shadow: 0 0 10px var(--pink);
  }

  /* Music toggle */
  .music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 500;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--black);
    background: var(--orange);
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #884400;
    letter-spacing: 1px;
  }

  .music-btn:hover {
    background: var(--yellow);
    transform: translate(1px,1px);
    box-shadow: 2px 2px 0 #664400;
  }

  /* Coin animation on enter */
  @keyframes coinSpin {
    from { transform: rotateY(0deg) scale(0); }
    to { transform: rotateY(360deg) scale(1); }
  }

  .coin-burst {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    z-index: 200;
    animation: burstAway 1.2s ease-out forwards;
    pointer-events: none;
  }

  @keyframes burstAway {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
    100% { opacity: 0; transform: translate(-50%, -100px) scale(2); }
  }

  /* Pixel border animation */
  @keyframes marchingAnts {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -20; }
  }

  /* Responsive tweaks */
  @media (max-width: 480px) {
    .text-box { padding: 18px 16px; }
    .score-bar { font-size: 7px; }
  }

  /* Typewriter cursor */
  .cursor-blink {
    display: inline-block;
    width: 10px; height: 16px;
    background: var(--cyan);
    margin-left: 4px;
    animation: cursorBlink 1s steps(1) infinite;
    vertical-align: middle;
  }

  @keyframes cursorBlink {
    0%,49% { opacity: 1; }
    50%,100% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div id="stars-bg"></div>

<!-- Floating pixels -->
<div class="pixel-float" style="top:15%;left:5%;--dur:7s;--dly:0s">⭐</div>
<div class="pixel-float" style="top:30%;right:4%;--dur:5s;--dly:1s">💫</div>
<div class="pixel-float" style="top:60%;left:3%;--dur:8s;--dly:2s">✨</div>
<div class="pixel-float" style="top:75%;right:6%;--dur:6s;--dly:0.5s">🌟</div>

<!-- INTRO -->
<div id="intro-screen">
  <div class="intro-deco">
    <span class="pixel-sprite">🕹️</span>
    <span class="pixel-sprite">🎮</span>
    <span class="pixel-sprite">👾</span>
  </div>
  <div class="intro-title">
    ★ TIENES UN MENSAJE ★<br>
    <span class="pixel-heart-big">♥</span><br>
    ALGUIEN PIENSA EN TI
  </div>
  <button id="start-btn" onclick="startGame()">▶ CLIC AQUÍ</button>
  <div style="font-size:8px;color:#444;letter-spacing:2px;margin-top:10px">PRESIONA PARA CONTINUAR</div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">
  <div class="game-header">
    <div class="score-bar">
      <span>♠ MENSAJE ESPECIAL</span>
      <span class="lives">♥♥♥ LIVES: ∞</span>
      <span id="score-display">AMOR: 9999</span>
    </div>

    <div class="title-main">
      ★ FELIZ CUMPLEAÑOS ★<br>
      JUAN FELIPE
    </div>
    <div class="title-sub">— NIVEL: DISTANCIA INFINITA —</div>
  </div>

  <div class="pixel-divider">
    <div class="pixel-divider-line"></div>
    <span class="pixel-divider-icon">🕹️</span>
    <div class="pixel-divider-line"></div>
  </div>

  <!-- Pixel scene -->
  <div class="pixel-scene" style="max-width:700px;margin:0 auto 30px;">
    <div class="scene-moon"></div>
    <div class="scene-bird">🐦</div>
    <div class="scene-bird">🐦</div>
    <div class="scene-bird">🐦</div>
    <div class="scene-city"></div>
    <div class="scene-ground"></div>
  </div>

  <div class="page-indicator" id="page-indicator"></div>

  <!-- Text container -->
  <div class="text-box-wrapper">
    <div id="text-container"></div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>◄ PREV</button>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)">NEXT ►</button>
  </div>

  <div style="text-align:center;font-size:7px;color:#333;padding-bottom:30px;letter-spacing:2px">
    INSERT COIN TO CONTINUE ©2025
  </div>
</div>

<!-- Music button -->
<button class="music-btn" id="music-btn" onclick="toggleMusic()">♪ MÚSICA ON</button>

<script>
// ─── STARS ────────────────────────────────────────────────
const starsContainer = document.getElementById('stars-bg');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*3}s;opacity:${0.3+Math.random()*0.7}`;
  starsContainer.appendChild(s);
}

// ─── MUSIC — Nostalgic slow chiptune (RPG ending theme style) ─────
let audioCtx = null;
let musicPlaying = false;
let musicTimeout = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Slow nostalgic chiptune — Am pentatonic, RPG ending/overworld feel
// BPM 58, triangle wave with reverb + vibrato
const N = {
  _:0, A2:110,C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,
  A3:220,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,
  A4:440,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99
};

// [freq, beats] — melody phrase, loops
const MEL = [
  [N.E4,1.5],[N.D4,0.5],[N.C4,1],[N.A3,1],[N._,0.5],
  [N.C4,0.5],[N.D4,0.5],[N.E4,1],[N.G4,1.5],[N.F4,0.5],[N.E4,2],[N._,0.5],
  [N.A4,1],[N.G4,0.5],[N.F4,0.5],[N.E4,1],[N.D4,1],
  [N.C4,0.5],[N.D4,0.5],[N.E4,2],[N._,0.5],
  [N.C5,1.5],[N.A4,0.5],[N.G4,1],[N.F4,1],
  [N.E4,0.5],[N.D4,0.5],[N.C4,1],[N.A3,1.5],[N._,0.5],
  [N.D4,1],[N.E4,0.5],[N.F4,0.5],[N.G4,1],[N.A4,1],
  [N.G4,0.5],[N.F4,0.5],[N.E4,1.5],[N.D4,0.5],[N.C4,1],[N.A3,2.5],[N._,1],
];

// Arpeggiated bass — Am, F, C, G loop
const BASS = [
  [N.A2,1],[N.E3,1],[N.A3,1],[N.E3,1],
  [N.F3,1],[N.C3,1],[N.A2,1],[N.C3,1],
  [N.C3,1],[N.G3,1],[N.E3,1],[N.G3,1],
  [N.G3,1],[N.D3,1],[N.G3,1],[N.D3,1],
  [N.A2,1],[N.E3,1],[N.A3,1],[N.E3,1],
  [N.F3,1],[N.C3,1],[N.A2,1],[N.C3,1],
  [N.C3,1],[N.G3,1],[N.E3,1],[N.G3,1],
  [N.D3,1],[N.A2,1],[N.D3,1],[N.A2,1],
];

const BPM = 58;
const BEAT = 60 / BPM;
let melPos=0, bassPos=0, melTime=0, bassTime=0;
let reverbNode=null, dryBus=null, masterGain=null;

function buildReverb() {
  const ctx = getCtx();
  const conv = ctx.createConvolver();
  const len = ctx.sampleRate * 3;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);
  }
  conv.buffer=buf;
  return conv;
}

function getChain() {
  const ctx = getCtx();
  if (!reverbNode) {
    reverbNode = buildReverb();
    masterGain = ctx.createGain(); masterGain.gain.value = 0.8;
    dryBus = ctx.createGain(); dryBus.gain.value = 0.6;
    const wetBus = ctx.createGain(); wetBus.gain.value = 0.4;
    reverbNode.connect(wetBus);
    wetBus.connect(masterGain);
    dryBus.connect(masterGain);
    masterGain.connect(ctx.destination);
  }
  return {dry:dryBus, rev:reverbNode};
}

function chipNote(freq, type, dur, vol, t0, vib) {
  if (!freq) return;
  const ctx = getCtx();
  const {dry,rev} = getChain();
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (vib) {
    const lfo = ctx.createOscillator();
    const lg  = ctx.createGain();
    lfo.frequency.value = 5.2;
    lg.gain.value = freq * 0.011;
    lfo.connect(lg); lg.connect(osc.frequency);
    lfo.start(t0+0.35); lfo.stop(t0+dur+0.1);
  }
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0+0.09);
  g.gain.setValueAtTime(vol*0.65, t0+dur*0.55);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur+0.18);
  osc.connect(g); g.connect(dry); g.connect(rev);
  osc.start(t0); osc.stop(t0+dur+0.22);
}

function scheduleSong() {
  if (!musicPlaying) return;
  const ctx = getCtx();
  const ahead = BEAT * 6;
  const now = ctx.currentTime;

  while (melTime < now + ahead) {
    const [f,b] = MEL[melPos % MEL.length];
    const d = b * BEAT;
    if (melTime < now) melTime = now;
    chipNote(f, 'triangle', d*0.86, 0.11, melTime, true);
    if (f) chipNote(f*2, 'sine', d*0.55, 0.022, melTime+0.05, false);
    melTime += d; melPos++;
  }

  while (bassTime < now + ahead) {
    const [f,b] = BASS[bassPos % BASS.length];
    const d = b * BEAT;
    if (bassTime < now) bassTime = now;
    chipNote(f, 'sine', d*0.72, 0.065, bassTime, false);
    if (f) chipNote(f*1.498, 'triangle', d*0.85, 0.028, bassTime, false);
    bassTime += d; bassPos++;
  }

  musicTimeout = setTimeout(scheduleSong, ahead * 700);
}

function startMusic() {
  const ctx = getCtx(); ctx.resume();
  musicPlaying = true;
  melTime = ctx.currentTime + 0.12;
  bassTime = ctx.currentTime + 0.12;
  melPos=0; bassPos=0;
  scheduleSong();
  document.getElementById('music-btn').textContent = '♪ MÚSICA ON';
}

function stopMusic() {
  musicPlaying = false;
  clearTimeout(musicTimeout);
  document.getElementById('music-btn').textContent = '♫ MÚSICA OFF';
}

function toggleMusic() {
  if (musicPlaying) stopMusic(); else startMusic();
}

let currentPage = 0;

function renderPage(idx) {
  const p = pages[idx];
  const container = document.getElementById('text-container');

  // Update dots
  const dots = document.getElementById('page-indicator');
  dots.innerHTML = pages.map((_, i) =>
    `<span class="page-dot ${i === idx ? 'active' : ''}"></span>`
  ).join('');

  // Build box
  const box = document.createElement('div');
  box.className = 'text-box' + (p.isFinal ? ' final-box' : '');

  if (p.isFinal) {
    box.innerHTML = `<div class="final-title">★ FIN DEL MENSAJE ★</div>`;
  }

  box.innerHTML += `<div class="text-box-header">${p.header}</div>`;

  p.paragraphs.forEach((text, i) => {
    const para = document.createElement('p');
    para.className = 'text-paragraph';
    para.innerHTML = text;
    box.appendChild(para);
  });

  // Fade out old, replace, fade in
  container.style.opacity = '0';
  container.style.transform = 'translateY(8px)';
  container.style.transition = 'opacity 0.3s, transform 0.3s';

  setTimeout(() => {
    container.innerHTML = '';
    container.appendChild(box);
    container.style.opacity = '1';
    container.style.transform = 'translateY(0)';

    // Staggered reveal of paragraphs
    const paras = box.querySelectorAll('.text-paragraph');
    paras.forEach((para, i) => {
      setTimeout(() => para.classList.add('revealed'), 200 + i * 300);
    });
  }, 300);

  // Buttons
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === pages.length - 1;
  if (idx === pages.length - 1) {
    document.getElementById('next-btn').textContent = 'FIN ★';
  } else {
    document.getElementById('next-btn').textContent = 'NEXT ►';
  }
}

function changePage(dir) {
  const newIdx = currentPage + dir;
  if (newIdx < 0 || newIdx >= pages.length) return;
  currentPage = newIdx;

  // Coin sound effect
  playCoin();

  renderPage(currentPage);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function playCoin() {
  try {
    const ctx = getCtx();
    const freqs = [523, 659, 784, 1047];
    freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.06);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.1);
      osc.start(ctx.currentTime + i * 0.06);
      osc.stop(ctx.currentTime + i * 0.06 + 0.12);
    });
  } catch(e) {}
}

function playStartJingle() {
  try {
    const ctx = getCtx();
    const notes = [261, 329, 392, 523, 659, 784, 1047];
    notes.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.15);
      osc.start(ctx.currentTime + i * 0.08);
      osc.stop(ctx.currentTime + i * 0.08 + 0.18);
    });
  } catch(e) {}
}

function startGame() {
  const intro = document.getElementById('intro-screen');
  const main = document.getElementById('main-content');

  // Flash effect
  intro.style.transition = 'opacity 0.5s';
  intro.style.opacity = '0';

  playStartJingle();
  setTimeout(() => {
    startMusic();
  }, 600);

  setTimeout(() => {
    intro.style.display = 'none';
    main.classList.add('visible');

    // Coin burst
    const coin = document.createElement('div');
    coin.className = 'coin-burst';
    coin.textContent = '🎂';
    document.body.appendChild(coin);
    setTimeout(() => coin.remove(), 1200);

    renderPage(0);
  }, 500);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') changePage(1);
  if (e.key === 'ArrowLeft') changePage(-1);
});
